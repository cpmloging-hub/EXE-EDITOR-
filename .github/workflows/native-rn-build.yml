name: Native React Native Android Build (CI-generated project)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build_native_apk:
    name: Build Android APK (generate RN project in CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Android SDK
      uses: r0adkll/setup-android@v2
      with:
        api-level: 33
        build-tools: 33.0.2
        ndk: 25.2.9519653

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Create minimal React Native project
      run: |
        npx react-native init tempRNProject --version 0.72.12 --npm

    - name: Copy app UI into generated project
      run: |
        cp App.tsx tempRNProject/App.tsx || true
        # If there are additional assets or configs, copy them here

    - name: Install project dependencies
      run: |
        cd tempRNProject
        npm install --legacy-peer-deps
        npm install ffmpeg-kit-react-native @react-native-community/slider --save --legacy-peer-deps || true

    - name: Build Debug APK
      run: |
        cd tempRNProject/android
        chmod +x ./gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: tempRNProject/android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release (optional, manual trigger only)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: tempRNProject/android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
